<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Admin Panel - edited.frame</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(123,47,242,0.1), rgba(243,87,168,0.1));
            border-radius: 20px;
            border: 2px solid rgba(123,47,242,0.2);
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #7b2ff2, #f357a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-wrap {
            max-width: 420px;
            margin: 70px auto;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(123,47,242,0.25);
            border-radius: 16px;
            padding: 24px;
        }
        .login-wrap h2 { margin-bottom: 10px; }
        .login-wrap p { color: #cfd1da; margin-bottom: 12px; }
        .login-wrap input {
            width: 100%;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid rgba(123,47,242,0.25);
            padding: 12px;
            background: rgba(255,255,255,0.95);
        }
        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, #7b2ff2, #f357a8); color: white; }
        .btn-secondary { background: transparent; color: #7b2ff2; border: 2px solid #7b2ff2; }
        .btn-danger { background: #dc3545; color: white; }
        .btn:hover { transform: translateY(-1px); }
        .error-msg { color: #ff8f8f; min-height: 20px; margin-top: 8px; }

        .admin-app[hidden], .login-wrap[hidden] { display: none !important; }
        .quick-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .quick-nav-left { display: flex; gap: 10px; flex-wrap: wrap; }
        .quick-link {
            padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid rgba(123,47,242,0.35);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            background: rgba(123,47,242,0.15);
            cursor: pointer;
        }
        .quick-link:hover { background: rgba(123,47,242,0.28); }
        .db-status {
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border: 1px solid transparent;
        }
        .db-status.checking { background: rgba(255,193,7,0.18); border-color: rgba(255,193,7,0.45); color: #ffe28a; }
        .db-status.connected { background: rgba(40,167,69,0.2); border-color: rgba(40,167,69,0.45); color: #8df0aa; }
        .db-status.disconnected { background: rgba(220,53,69,0.2); border-color: rgba(220,53,69,0.45); color: #ff9aa5; }
        .video-manager {
            margin: 18px 0 22px;
            padding: 18px;
            border-radius: 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(123,47,242,0.18);
        }
        .video-manager h2 { margin-bottom: 8px; }
        .video-manager p { color: #cfd1da; margin-bottom: 14px; }
        .video-form {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1fr auto auto;
            gap: 10px;
            align-items: center;
        }
        .video-form input,
        .video-form select {
            width: 100%;
            padding: 11px 12px;
            border-radius: 10px;
            border: 1px solid rgba(123,47,242,0.25);
            background: rgba(255,255,255,0.95);
            color: #1f2430;
        }
        .video-list {
            margin-top: 14px;
            display: grid;
            gap: 10px;
        }
        .video-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(123,47,242,0.14);
        }
        .video-row-info { min-width: 0; }
        .video-row-title { font-weight: 700; margin-bottom: 4px; }
        .video-row-meta { color: #cfd1da; font-size: 12px; word-break: break-all; }
        .top-actions { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(123,47,242,0.1);
            border: 1px solid rgba(123,47,242,0.2);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-number { font-size: 30px; font-weight: 800; color: #7b2ff2; }
        .stat-label { color: #cfd1da; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
        .filter-tab {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid rgba(123,47,242,0.25);
            color: #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .filter-tab.active { background: rgba(123,47,242,0.2); color: #fff; }
        .reviews-grid { display: grid; gap: 18px; }
        .review-item {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            border: 1px solid rgba(123,47,242,0.15);
            padding: 18px;
        }
        .review-header { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .reviewer-info h3 { color: #c7a8ff; margin-bottom: 4px; }
        .reviewer-meta { color: #cfd1da; font-size: 13px; }
        .rating { color: #ffd060; font-size: 18px; }
        .review-text { margin: 10px 0; color: #f0f0f0; line-height: 1.5; white-space: pre-wrap; }
        .review-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .status-badge { padding: 4px 10px; border-radius: 999px; font-size: 12px; text-transform: uppercase; font-weight: 700; }
        .status-approved { background: rgba(40,167,69,0.2); color: #7ee39a; }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffd65f; }
        .status-rejected { background: rgba(220,53,69,0.2); color: #ff8e9a; }
        .empty-state { text-align: center; padding: 50px 20px; color: #cfd1da; }
        @media (max-width: 768px) { .review-header { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <div class="quick-nav">
        <div class="quick-nav-left">
            <a class="quick-link" href="index.html">Main Site</a>
            <button class="quick-link" type="button" onclick="goBack()">Back</button>
        </div>
        <div id="dbStatus" class="db-status checking">DB: Checking...</div>
    </div>

    <div id="loginWrap" class="login-wrap" hidden>
        <h2>Admin Login</h2>
        <p>Only admin can access review controls.</p>
        <input id="adminName" type="text" placeholder="Admin name" autocomplete="username">
        <input id="adminPassword" type="password" placeholder="Password" autocomplete="current-password">
        <button class="btn btn-primary" onclick="loginAdmin()">Login</button>
        <div id="loginError" class="error-msg"></div>
    </div>

    <div id="adminApp" class="admin-app" hidden>
        <div class="header">
            <h1>Review Admin Panel</h1>
            <p>MongoDB-backed review moderation dashboard</p>
        </div>

        <div class="top-actions">
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="refreshReviews()">Refresh</button>
                <button class="btn btn-secondary" onclick="exportReviews()">Export Backup</button>
                <button class="btn btn-secondary" onclick="document.querySelector('.video-manager')?.scrollIntoView({ behavior: 'smooth', block: 'start' })">Video Manager</button>
            </div>
            <button class="btn btn-danger" onclick="logoutAdmin()">Logout</button>
        </div>

        <div class="video-manager">
            <h2>Video Manager</h2>
            <p>Add or manage video URLs here. This tool is hidden from public users.</p>
            <div class="video-form">
                <input type="url" id="adminVideoUrl" placeholder="https://.../video.mp4">
                <input type="text" id="adminVideoTitle" placeholder="Optional title (auto if empty)">
                <select id="adminVideoCategory">
                    <option value="social-media">Social Media Edits</option>
                    <option value="trading-reel">Trading Reels</option>
                    <option value="educational-video">Educational Videos</option>
                    <option value="motion-graphic">Motion Graphics</option>
                </select>
                <button class="btn btn-primary" type="button" onclick="addAdminVideo()">Add Video</button>
                <button class="btn btn-secondary" type="button" onclick="clearAdminVideos()">Clear All</button>
            </div>
            <div id="adminVideoMsg" class="error-msg"></div>
            <div id="adminVideoList" class="video-list"></div>
        </div>

        <div class="stats" id="statsGrid"></div>

        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterReviews('all', event)">All Reviews</button>
            <button class="filter-tab" onclick="filterReviews('pending', event)">Pending</button>
            <button class="filter-tab" onclick="filterReviews('approved', event)">Approved</button>
            <button class="filter-tab" onclick="filterReviews('rejected', event)">Rejected</button>
        </div>

        <div class="reviews-grid" id="reviewsGrid"></div>
    </div>
</div>

<script src="js/config.js"></script>
<script>
class ReviewAdmin {
    constructor() {
        this.apiBaseUrl = (window.CONFIG && window.CONFIG.apiBaseUrl) || '/api';
        this.tokenStorageKey = 'editedframe_admin_token_v1';
        this.currentFilter = 'all';
        this.reviews = [];
    }

    getToken() {
        return localStorage.getItem(this.tokenStorageKey) || '';
    }

    setToken(token) {
        if (token) {
            localStorage.setItem(this.tokenStorageKey, token);
        }
    }

    clearToken() {
        localStorage.removeItem(this.tokenStorageKey);
    }

    setDbStatus(type, message) {
        const el = document.getElementById('dbStatus');
        if (!el) return;
        el.className = `db-status ${type}`;
        el.textContent = message;
    }

    async updateDbStatus() {
        this.setDbStatus('checking', 'Status: Checking...');
        try {
            const res = await fetch(`${this.apiBaseUrl}/health`);
            const data = await res.json().catch(() => ({}));
            if (res.ok && data.database && data.database.connected) {
                this.setDbStatus('connected', 'Status: Backend online, DB connected');
            } else if (res.ok && data.database && !data.database.connected) {
                this.setDbStatus('disconnected', 'Status: Backend online, DB disconnected');
            } else {
                this.setDbStatus('disconnected', 'Status: Backend offline');
            }
        } catch (_) {
            this.setDbStatus('disconnected', 'Status: Backend offline');
        }
    }

    async api(path, options = {}) {
        try {
            const token = this.getToken();
            const authHeaders = token ? { Authorization: `Bearer ${token}` } : {};
            const res = await fetch(`${this.apiBaseUrl}${path}`, {
                headers: {
                    'Content-Type': 'application/json',
                    ...authHeaders,
                    ...(options.headers || {}),
                },
                ...options,
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                throw new Error(data.message || `Request failed (${res.status})`);
            }
            return data;
        } catch (error) {
            const message = (error && error.message) ? error.message : '';
            if (message.toLowerCase().includes('failed to fetch') || message.toLowerCase().includes('networkerror')) {
                throw new Error('Backend is offline or API URL is wrong. Please check deployment and API base URL.');
            }
            throw error;
        }
    }

    async loadStats() {
        const stats = await this.api('/reviews/admin/stats');
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-number">${stats.total}</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-number">${stats.pending}</div><div class="stat-label">Pending</div></div>
            <div class="stat-card"><div class="stat-number">${stats.approved}</div><div class="stat-label">Approved</div></div>
            <div class="stat-card"><div class="stat-number">${stats.rejected}</div><div class="stat-label">Rejected</div></div>
            <div class="stat-card"><div class="stat-number">${stats.avgRating.toFixed(1)}</div><div class="stat-label">Avg Rating</div></div>
        `;
    }

    async loadReviews() {
        const status = this.currentFilter;
        const path = status === 'all' ? '/reviews/admin/all' : `/reviews/admin/all?status=${encodeURIComponent(status)}`;
        const data = await this.api(path);
        this.reviews = data.items || [];

        const grid = document.getElementById('reviewsGrid');
        if (!this.reviews.length) {
            grid.innerHTML = '<div class="empty-state"><h3>No reviews found</h3><p>No data in this filter.</p></div>';
            return;
        }

        grid.innerHTML = this.reviews.map((review) => this.createReviewHTML(review)).join('');
    }

    createReviewHTML(review) {
        const date = new Date(review.createdAt || Date.now()).toLocaleDateString();
        const stars = ''.repeat(Math.max(1, review.rating || 0)) + ''.repeat(5 - Math.max(1, review.rating || 0));

        return `
            <div class="review-item">
                <div class="review-header">
                    <div class="reviewer-info">
                        <h3>${this.escape(review.reviewerName || 'Anonymous')}</h3>
                        <div class="reviewer-meta">
                            ${this.escape(review.projectType || 'Project')}  ${date}  ${this.escape(review.reviewerEmail || 'No email')}
                            ${review.reviewerInstagram ? `  ${this.escape(review.reviewerInstagram)}` : ''}
                        </div>
                    </div>
                    <div>
                        <div class="rating">${stars}</div>
                        <div class="status-badge status-${review.status}">${review.status}</div>
                    </div>
                </div>
                <div class="review-text">${this.escape(review.reviewText || '')}</div>
                <div class="review-actions">
                    ${review.status !== 'approved' ? `<button class="btn btn-primary" onclick="admin.updateReviewStatus('${review.id}', 'approved')">Approve</button>` : ''}
                    ${review.status !== 'rejected' ? `<button class="btn btn-secondary" onclick="admin.updateReviewStatus('${review.id}', 'rejected')">Reject</button>` : ''}
                    ${review.status !== 'pending' ? `<button class="btn btn-secondary" onclick="admin.updateReviewStatus('${review.id}', 'pending')">Mark Pending</button>` : ''}
                    <button class="btn btn-danger" onclick="admin.deleteReview('${review.id}')">Delete</button>
                </div>
            </div>
        `;
    }

    async updateReviewStatus(reviewId, status) {
        await this.api(`/reviews/admin/${reviewId}/status`, {
            method: 'PATCH',
            body: JSON.stringify({ status }),
        });
        await this.loadStats();
        await this.loadReviews();
    }

    async deleteReview(reviewId) {
        if (!confirm('Delete this review permanently?')) return;
        await this.api(`/reviews/admin/${reviewId}`, { method: 'DELETE' });
        await this.loadStats();
        await this.loadReviews();
    }

    async refresh() {
        await this.loadStats();
        await this.loadReviews();
    }

    exportReviews() {
        const data = JSON.stringify(this.reviews, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `editedframe_reviews_${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
    }

    escape(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
}

class AdminVideoManager {
    constructor() {
        this.storageKey = 'editedframe_custom_videos_v1';
        this.videos = [];
        this.load();
    }

    load() {
        try {
            const raw = localStorage.getItem(this.storageKey);
            this.videos = raw ? JSON.parse(raw) : [];
            if (!Array.isArray(this.videos)) this.videos = [];
        } catch (_) {
            this.videos = [];
        }
    }

    save() {
        localStorage.setItem(this.storageKey, JSON.stringify(this.videos));
    }

    inferTitle(url) {
        try {
            const pathname = new URL(url).pathname;
            const fileName = pathname.split('/').pop() || 'Video';
            return fileName.replace(/\.[^/.]+$/, '').replace(/[_-]+/g, ' ').replace(/\s+/g, ' ').trim() || 'Untitled Video';
        } catch (_) {
            return 'Untitled Video';
        }
    }

    normalizeCategory(category) {
        const value = String(category || '').toLowerCase().trim();
        const map = {
            'trading-reel': 'trading-reel',
            'educational-video': 'educational-video',
            'social-media': 'social-media',
            'motion-graphic': 'motion-graphic',
        };
        return map[value] || 'social-media';
    }

    categoryLabel(category) {
        const labels = {
            'social-media': 'Social Media Edits',
            'trading-reel': 'Trading Reels',
            'educational-video': 'Educational Videos',
            'motion-graphic': 'Motion Graphics',
        };
        return labels[category] || 'Social Media Edits';
    }

    render() {
        const list = document.getElementById('adminVideoList');
        if (!list) return;

        if (!this.videos.length) {
            list.innerHTML = '<div class="empty-state"><h3>No custom videos yet</h3><p>Add one using the form above.</p></div>';
            return;
        }

        list.innerHTML = this.videos.map((video) => `
            <div class="video-row">
                <div class="video-row-info">
                    <div class="video-row-title">${this.escape(video.title || 'Untitled Video')}</div>
                    <div class="video-row-meta">${this.categoryLabel(video.category)} • ${this.escape(video.url)}</div>
                </div>
                <button class="btn btn-danger" type="button" onclick="removeAdminVideo('${video.id}')">Delete</button>
            </div>
        `).join('');
    }

    add(url, title, category) {
        const safeUrl = String(url || '').trim();
        if (!safeUrl) {
            return { success: false, message: 'Please enter a video URL.' };
        }
        try {
            const parsed = new URL(safeUrl);
            if (!['http:', 'https:'].includes(parsed.protocol)) {
                return { success: false, message: 'URL must start with http or https.' };
            }
        } catch (_) {
            return { success: false, message: 'Please enter a valid video URL.' };
        }

        const item = {
            id: `custom-${Date.now()}`,
            url: safeUrl,
            title: String(title || '').trim() || this.inferTitle(safeUrl),
            category: this.normalizeCategory(category),
            custom: true,
        };

        this.videos.unshift(item);
        this.save();
        this.render();
        return { success: true, message: 'Video saved.' };
    }

    remove(id) {
        this.videos = this.videos.filter((video) => video.id !== id);
        this.save();
        this.render();
    }

    clear() {
        this.videos = [];
        this.save();
        this.render();
    }

    escape(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
}

const admin = new ReviewAdmin();
const videoAdmin = new AdminVideoManager();

function addAdminVideo() {
    const url = document.getElementById('adminVideoUrl')?.value || '';
    const title = document.getElementById('adminVideoTitle')?.value || '';
    const category = document.getElementById('adminVideoCategory')?.value || 'social-media';
    const msg = document.getElementById('adminVideoMsg');

    const result = videoAdmin.add(url, title, category);
    if (msg) {
        msg.textContent = result.message;
        msg.style.color = result.success ? '#8df0aa' : '#ff9aa5';
    }

    if (result.success) {
        if (document.getElementById('adminVideoUrl')) document.getElementById('adminVideoUrl').value = '';
        if (document.getElementById('adminVideoTitle')) document.getElementById('adminVideoTitle').value = '';
    }
}

function removeAdminVideo(id) {
    videoAdmin.remove(id);
}

function clearAdminVideos() {
    if (!confirm('Clear all custom videos?')) return;
    videoAdmin.clear();
}

async function checkSession() {
    await admin.updateDbStatus();
    try {
        if (!admin.getToken()) {
            throw new Error('Not admin');
        }
        const me = await admin.api('/auth/me');
        if (!me.isAdmin) {
            throw new Error('Not admin');
        }
        document.getElementById('loginWrap').hidden = true;
        document.getElementById('adminApp').hidden = false;
        videoAdmin.render();
        await admin.refresh();
    } catch (_) {
        document.getElementById('adminApp').hidden = true;
        document.getElementById('loginWrap').hidden = false;
    }
}

async function loginAdmin() {
    const username = document.getElementById('adminName').value.trim();
    const password = document.getElementById('adminPassword').value;

    try {
        const loginResult = await admin.api('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ username, password }),
        });

        if (!loginResult.token) {
            throw new Error('Token not received from server');
        }

        admin.setToken(loginResult.token);

        const me = await admin.api('/auth/me');
        if (!me.isAdmin) {
            throw new Error('Login succeeded but admin token validation failed. Please refresh and login again.');
        }

        document.getElementById('loginError').textContent = '';
        await checkSession();
    } catch (error) {
        const msg = (error && error.message) ? error.message : 'Login failed';
        document.getElementById('loginError').textContent = msg;
    }
}

async function logoutAdmin() {
    await admin.api('/auth/logout', { method: 'POST' });
    admin.clearToken();
    await checkSession();
}

function goBack() {
    if (window.history.length > 1) {
        window.history.back();
        return;
    }
    window.location.href = 'index.html';
}

function refreshReviews() { admin.refresh(); }
function exportReviews() { admin.exportReviews(); }

function filterReviews(status, event) {
    admin.currentFilter = status;
    document.querySelectorAll('.filter-tab').forEach((tab) => tab.classList.remove('active'));
    if (event && event.target) event.target.classList.add('active');
    admin.loadReviews();
}

checkSession();
setInterval(() => admin.updateDbStatus(), 30000);
</script>
</body>
</html>
