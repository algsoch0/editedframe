<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Admin Panel - edited.frame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(123,47,242,0.1), rgba(243,87,168,0.1));
            border-radius: 20px;
            border: 2px solid rgba(123,47,242,0.2);
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #7b2ff2, #f357a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(123,47,242,0.1);
            padding: 20px;
            border-radius: 16px;
            border: 2px solid rgba(123,47,242,0.2);
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #7b2ff2;
            margin-bottom: 8px;
        }
        
        .stat-label {
            color: #ccc;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        .actions {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #7b2ff2, #f357a8);
            color: white;
        }
        
        .btn-secondary {
            background: transparent;
            color: #7b2ff2;
            border: 2px solid #7b2ff2;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(123,47,242,0.3);
        }
        
        .reviews-grid {
            display: grid;
            gap: 24px;
        }
        
        .review-item {
            background: rgba(255,255,255,0.05);
            padding: 24px;
            border-radius: 16px;
            border: 2px solid rgba(123,47,242,0.1);
            transition: all 0.3s ease;
        }
        
        .review-item:hover {
            border-color: #7b2ff2;
            transform: translateY(-2px);
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .reviewer-info h3 {
            color: #7b2ff2;
            margin-bottom: 4px;
        }
        
        .reviewer-meta {
            color: #ccc;
            font-size: 14px;
        }
        
        .rating {
            font-size: 18px;
            color: #f357a8;
        }
        
        .review-text {
            margin: 16px 0;
            line-height: 1.6;
            color: #eee;
        }
        
        .review-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .btn-approve {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        
        .btn-reject {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        
        .btn-delete {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-approved { background: rgba(40,167,69,0.2); color: #28a745; }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-rejected { background: rgba(220,53,69,0.2); color: #dc3545; }
        
        .filter-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 2px solid rgba(123,47,242,0.1);
            padding-bottom: 16px;
        }
        
        .filter-tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #ccc;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .filter-tab.active {
            background: rgba(123,47,242,0.2);
            color: #7b2ff2;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #ccc;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .actions {
                flex-direction: column;
            }
            
            .review-header {
                flex-direction: column;
                gap: 12px;
            }
            
            .filter-tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Review Admin Panel</h1>
            <p>Manage reviews for edited.frame portfolio</p>
        </div>
        
        <div class="stats" id="statsGrid">
            <!-- Stats will be loaded here -->
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" onclick="refreshReviews()">
                <span>🔄</span>
                <span>Refresh</span>
            </button>
            <button class="btn btn-secondary" onclick="exportReviews()">
                <span>📥</span>
                <span>Export Backup</span>
            </button>
            <button class="btn btn-success" onclick="exportForGist()">
                <span>🌍</span>
                <span>Export for Gist</span>
            </button>
            <button class="btn btn-secondary" onclick="clearAllReviews()">
                <span>🗑️</span>
                <span>Clear All</span>
            </button>
            <button class="btn btn-secondary" onclick="importSampleReviews()">
                <span>📝</span>
                <span>Add Sample Reviews</span>
            </button>
        </div>
        
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterReviews('all')">All Reviews</button>
            <button class="filter-tab" onclick="filterReviews('pending')">Pending</button>
            <button class="filter-tab" onclick="filterReviews('approved')">Approved</button>
            <button class="filter-tab" onclick="filterReviews('rejected')">Rejected</button>
        </div>
        
        <div class="reviews-grid" id="reviewsGrid">
            <!-- Reviews will be loaded here -->
        </div>
    </div>

    <script>
        class ReviewAdmin {
            constructor() {
                this.storageKey = 'editedframe_reviews';
                this.currentFilter = 'all';
                this.init();
            }
            
            init() {
                this.loadStats();
                this.loadReviews();
            }
            
            getStoredReviews() {
                try {
                    const stored = localStorage.getItem(this.storageKey);
                    return stored ? JSON.parse(stored) : [];
                } catch(e) {
                    console.error('Error loading reviews:', e);
                    return [];
                }
            }
            
            saveReviews(reviews) {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(reviews));
                    return true;
                } catch(e) {
                    console.error('Error saving reviews:', e);
                    return false;
                }
            }
            
            loadStats() {
                const reviews = this.getStoredReviews();
                const stats = {
                    total: reviews.length,
                    approved: reviews.filter(r => r.status === 'approved').length,
                    pending: reviews.filter(r => r.status === 'pending').length,
                    rejected: reviews.filter(r => r.status === 'rejected').length,
                    avgRating: reviews.length > 0 ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1) : '0.0'
                };
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${stats.total}</div>
                        <div class="stat-label">Total Reviews</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.pending}</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.approved}</div>
                        <div class="stat-label">Approved</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.rejected}</div>
                        <div class="stat-label">Rejected</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.avgRating}</div>
                        <div class="stat-label">Avg Rating</div>
                    </div>
                `;
            }
            
            loadReviews() {
                const reviews = this.getStoredReviews();
                const filtered = this.currentFilter === 'all' ? reviews : reviews.filter(r => r.status === this.currentFilter);
                
                const grid = document.getElementById('reviewsGrid');
                
                if (filtered.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📝</div>
                            <h3>No reviews found</h3>
                            <p>No reviews match the current filter.</p>
                        </div>
                    `;
                    return;
                }
                
                // Sort by timestamp (newest first)
                filtered.sort((a, b) => b.timestamp - a.timestamp);
                
                grid.innerHTML = filtered.map(review => this.createReviewHTML(review)).join('');
            }
            
            createReviewHTML(review) {
                const date = new Date(review.timestamp).toLocaleDateString();
                const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                
                return `
                    <div class="review-item">
                        <div class="review-header">
                            <div class="reviewer-info">
                                <h3>${review.reviewerName}</h3>
                                <div class="reviewer-meta">
                                    ${review.projectType} • ${date} • ${review.reviewerEmail || 'No email'}
                                    ${review.reviewerInstagram ? ` • ${review.reviewerInstagram}` : ''}
                                </div>
                            </div>
                            <div class="review-rating">
                                <div class="rating">${stars}</div>
                                <div class="status-badge status-${review.status}">${review.status}</div>
                            </div>
                        </div>
                        
                        <div class="review-text">${review.reviewText}</div>
                        
                        <div class="review-actions">
                            ${review.status !== 'approved' ? `<button class="btn-approve" onclick="admin.updateReviewStatus('${review.id}', 'approved')">✅ Approve</button>` : ''}
                            ${review.status !== 'rejected' ? `<button class="btn-reject" onclick="admin.updateReviewStatus('${review.id}', 'rejected')">❌ Reject</button>` : ''}
                            ${review.status !== 'pending' ? `<button class="btn-reject" onclick="admin.updateReviewStatus('${review.id}', 'pending')">⏳ Pending</button>` : ''}
                            <button class="btn-delete" onclick="admin.deleteReview('${review.id}')">🗑️ Delete</button>
                        </div>
                        
                        <div style="margin-top: 12px; font-size: 12px; color: #888;">
                            ID: ${review.id} • Display: ${review.allowDisplay ? 'Yes' : 'No'}
                        </div>
                    </div>
                `;
            }
            
            updateReviewStatus(reviewId, newStatus) {
                const reviews = this.getStoredReviews();
                const review = reviews.find(r => r.id === reviewId);
                
                if (review) {
                    review.status = newStatus;
                    this.saveReviews(reviews);
                    this.loadStats();
                    this.loadReviews();
                    console.log(`✅ Review ${reviewId} status updated to ${newStatus}`);
                }
            }
            
            deleteReview(reviewId) {
                if (confirm('Are you sure you want to delete this review? This action cannot be undone.')) {
                    const reviews = this.getStoredReviews();
                    const filteredReviews = reviews.filter(r => r.id !== reviewId);
                    this.saveReviews(filteredReviews);
                    this.loadStats();
                    this.loadReviews();
                    console.log(`🗑️ Review ${reviewId} deleted`);
                }
            }
            
            filterReviews(status) {
                this.currentFilter = status;
                
                // Update active tab
                document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
                event.target.classList.add('active');
                
                this.loadReviews();
            }
            
            exportReviews() {
                const reviews = this.getStoredReviews();
                const dataStr = JSON.stringify(reviews, null, 2);
                const dataBlob = new Blob([dataStr], {type: 'application/json'});
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(dataBlob);
                link.download = `editedframe_reviews_backup_${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                
                console.log('📥 Reviews exported successfully');
            }

            exportForGist() {
                const reviews = this.getStoredReviews();
                const approvedReviews = reviews.filter(r => r.status === 'approved' && r.allowDisplay);
                
                if (approvedReviews.length === 0) {
                    alert('No approved reviews to export for Gist');
                    return;
                }
                
                const gistContent = JSON.stringify(approvedReviews, null, 2);
                
                // Create a text area to copy from
                const textArea = document.createElement('textarea');
                textArea.value = gistContent;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                // Show instructions
                alert(`✅ Copied ${approvedReviews.length} approved reviews to clipboard!\n\nNext steps:\n1. Go to your GitHub Gist\n2. Click "Edit"\n3. Replace content with clipboard (Ctrl+V)\n4. Save changes\n\nAll visitors will now see these reviews!`);
                
                console.log('🌍 Approved reviews copied for Gist update');
            }
            
            clearAllReviews() {
                if (confirm('Are you sure you want to delete ALL reviews? This action cannot be undone!')) {
                    localStorage.removeItem(this.storageKey);
                    this.loadStats();
                    this.loadReviews();
                    console.log('🗑️ All reviews cleared');
                }
            }
            
            importSampleReviews() {
                const sampleReviews = [
                    {
                        id: 'sample_1',
                        reviewerName: 'Alex Thompson',
                        reviewerEmail: 'alex@example.com',
                        reviewerInstagram: '@alexthompson',
                        projectType: 'Instagram Reel',
                        rating: 5,
                        reviewText: 'Absolutely amazing work! Sachin created an incredible Instagram reel for my business. The editing was smooth, the transitions were perfect, and it helped boost my engagement significantly. Highly recommend!',
                        allowDisplay: true,
                        status: 'approved',
                        timestamp: Date.now() - 86400000,
                        date: new Date(Date.now() - 86400000).toISOString().split('T')[0]
                    },
                    {
                        id: 'sample_2',
                        reviewerName: 'Sarah Johnson',
                        reviewerEmail: 'sarah.j@gmail.com',
                        reviewerInstagram: '',
                        projectType: 'YouTube Short',
                        rating: 4,
                        reviewText: 'Great experience working with Sachin. The YouTube short came out really well and the turnaround time was impressive. Looking forward to working together again!',
                        allowDisplay: true,
                        status: 'approved',
                        timestamp: Date.now() - 172800000,
                        date: new Date(Date.now() - 172800000).toISOString().split('T')[0]
                    },
                    {
                        id: 'sample_3',
                        reviewerName: 'Mike Chen',
                        reviewerEmail: 'mike.chen@business.com',
                        reviewerInstagram: '@mikechentrading',
                        projectType: 'Trading Video',
                        rating: 5,
                        reviewText: 'Perfect trading video! Sachin understood exactly what I needed and delivered a professional video that helped explain complex trading concepts in a simple way. Excellent communication throughout.',
                        allowDisplay: true,
                        status: 'pending',
                        timestamp: Date.now() - 259200000,
                        date: new Date(Date.now() - 259200000).toISOString().split('T')[0]
                    }
                ];
                
                const existingReviews = this.getStoredReviews();
                const newReviews = [...existingReviews];
                
                sampleReviews.forEach(sample => {
                    if (!existingReviews.find(r => r.id === sample.id)) {
                        newReviews.push(sample);
                    }
                });
                
                this.saveReviews(newReviews);
                this.loadStats();
                this.loadReviews();
                console.log('📝 Sample reviews added');
            }
        }
        
        // Global functions for HTML onclick handlers
        const admin = new ReviewAdmin();
        
        function refreshReviews() {
            admin.loadStats();
            admin.loadReviews();
            console.log('🔄 Reviews refreshed');
        }
        
        function exportReviews() {
            admin.exportReviews();
        }

        function exportForGist() {
            admin.exportForGist();
        }
        
        function clearAllReviews() {
            admin.clearAllReviews();
        }
        
        function importSampleReviews() {
            admin.importSampleReviews();
        }
        
        function filterReviews(status) {
            admin.filterReviews(status);
        }
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            admin.loadStats();
            admin.loadReviews();
        }, 30000);
        
        console.log('🛡️ Review Admin Panel loaded');
        console.log('📊 Total reviews:', admin.getStoredReviews().length);
    </script>
</body>
</html>
